<div class="card fade-in">
    <h2 style="text-align: center; margin-bottom: 10px;">Review & Contact</h2>
    <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Berikan ulasan Anda di bawah ini.</p>

    <form id="contact-form" novalidate>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="name" class="form-input" placeholder="Nama Anda...">
            <small class="error-msg" id="err-name"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="form-input" placeholder="Email Anda...">
            <small class="error-msg" id="err-email"></small>
        </div>

        <div class="form-group">
            <label>Pesan / Ulasan</label>
            <textarea id="message" class="form-input" rows="3" placeholder="Tulis ulasan..."></textarea>
            <small class="error-msg" id="err-message"></small>
        </div>

        <div class="form-group">
            <label>Rating</label>
            <div class="stars" id="star-input">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="rating-value" value="0">
        </div>

        <button type="submit" id="btn-submit">Kirim Ulasan</button>
    </form>

    <div id="success-alert">Ulasan berhasil dikirim!</div>

    <div class="reviews-section">
        <h3>Ulasan Terbaru</h3>
        <div id="reviews-list"></div>
    </div>
</div>

<style>
    .card { background: #ffffff; padding: 30px; border-radius: 20px; border: 1px solid #f1f5f9; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; transition: 0.3s; box-sizing: border-box; background: transparent; color: inherit; }
    .form-input:focus { border-color: #3498db; }
    .error-msg { color: #e74c3c; display: none; font-size: 0.8rem; }
    
    .stars .star { font-size: 30px; cursor: pointer; color: #cbd5e1; transition: 0.2s; }
    .stars .star.active { color: #f1c40f; }

    #btn-submit { width: 100%; background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #success-alert { display: none; margin-top: 20px; background: #d1fae5; color: #065f46; padding: 15px; border-radius: 8px; text-align: center; }

    .reviews-section { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
    .review-item { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); position: relative; }
    .delete-btn { position: absolute; top: 10px; right: 15px; color: #e74c3c; cursor: pointer; font-size: 11px; font-weight: bold; }

    /* Penyesuaian Dark Mode Otomatis */
    body.dark-mode .card { background: #1e293b; border-color: #334155; }
    body.dark-mode .review-item { background: rgba(255,255,255,0.05); border-color: #334155; }
</style>
