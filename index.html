<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dimas Luqmanul Hakim - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg-body: #147ee8;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --nav-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary: #0284c7;
            --primary-soft: rgba(2, 132, 199, 0.1);
            --overlay-bg: rgba(0, 0, 0, 0.4); 
        }

        .dark-mode {
            --bg-body: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --nav-bg: #0f172a;
            --border-color: #1e293b;
            --primary: #38bdf8;
            --primary-soft: rgba(56, 189, 248, 0.1);
            --overlay-bg: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            transition: background 0.3s, color 0.3s; 
            overflow-x: hidden;
        }

        header {
            background: var(--nav-bg);
            position: sticky;
            top: 0;
            z-index: 10001;
            border-bottom: 1px solid var(--border-color);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .logo { font-weight: 700; font-size: 1.2rem; color: var(--primary); text-decoration: none; }

        #main-nav { display: flex; gap: 5px; }
        #main-nav a { 
            color: var(--text-muted); 
            padding: 10px 15px; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.85rem; 
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
        #main-nav a.active { color: var(--primary); background: var(--primary-soft); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 10000; 
        }
        .hamburger span {
            width: 25px; height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-overlay {
    z-index: 9999; /* Lapisan hitam di bawah menu, tapi di atas konten */
    display: none; /* Default sembunyi */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
}
        .nav-overlay.active { display: block; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            #main-nav {
                position: fixed;
                top: 0; 
                right: -100%;
                width: 280px; 
                height: 100vh;
                background: var(--bg-card);
                flex-direction: column;
                padding: 100px 20px 20px;
                box-shadow: -10px 0 30px rgba(0,0,0,0.2);
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 10000;
            }
            #main-nav.open { right: 0; }
            #main-nav a { 
                font-size: 1.1rem; 
                padding: 15px; 
                width: 100%; 
                border-bottom: 1px solid var(--border-color); 
                color: var(--text-main); 
                border-radius: 0;
            }
        }

        /* --- PERBAIKAN CONTAINER DISINI --- */
        #content { 
            max-width: 600px; /* Standar ukuran mobile */
            margin: 20px auto; 
            padding: 0 15px; 
            min-height: 80vh; 
        }

        .main-card-container {
            background: var(--bg-card);
            border-radius: 24px; /* Sudut melengkung seperti di gambar */
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            transition: background 0.3s;
        }
        /* ---------------------------------- */
        
        .floating-container { position: fixed; bottom: 25px; right: 25px; z-index: 999; }
        .main-float-btn { width: 55px; height: 55px; background: var(--primary); color: white; border-radius: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); font-weight: 700; }
        .floating-menu { display: none; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .float-btn { width: 48px; height: 48px; border-radius: 14px; display: flex; border: none; justify-content: center; align-items: center; color: white; font-size: 20px; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .whatsapp { background: #25d366; } 
        .gmail { background: #ea4335; } 
        .theme-btn { background: #334155; }
        .floating-container:hover .floating-menu { display: flex; animation: slideUp 0.3s ease; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">MY PROFESIONAL CV</a>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        <nav id="main-nav">
            <a id="nav-home" class="active">HOME</a>
            <a id="nav-about">ABOUT</a>
            <a id="nav-skills">SKILLS</a>
            <a id="nav-education">EDUCATION</a>
            <a id="nav-experience">EXPERIENCE</a>
            <a id="nav-portfolio">PORTFOLIO</a>
            <a id="nav-github">GITHUB</a>
            <a id="nav-contact">CONTACT</a>
        </nav>
    </header>

    <div class="nav-overlay" id="nav-overlay"></div>
    
    <div id="content" class="fade-in main-card-container"></div>

    <div class="floating-container">
        <div class="floating-menu">
            <button id="theme-toggle" class="float-btn theme-btn" title="Toggle Tema">🌙</button>
            <a href="mailto:onlyxes0124@gmail.com" class="float-btn gmail" title="Kirim Email">📧</a>
            <a href="https://wa.me/6282113550226" target="_blank" class="float-btn whatsapp" title="Chat WhatsApp">💬</a>
        </div>
        <div class="main-float-btn">HELP</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
